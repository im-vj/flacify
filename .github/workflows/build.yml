name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: 'stable'
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: ${{ runner.os }}-pub-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Fix android config
        run: |
          sed -i '/android.aapt2FromMavenOverride/d' android/gradle.properties
          sed -i 's/compileSdk = 34/compileSdk = 36/' android/app/build.gradle.kts
          sed -i 's/targetSdk = 34/targetSdk = 35/' android/app/build.gradle.kts
          sed -i 's/version "8.3.2"/version "8.6.0"/' android/settings.gradle.kts

      - name: Flutter pub get
        run: flutter pub get

      - name: Decode keystore
        if: github.event_name != 'pull_request'
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/flacify-release.jks
          printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=%s\n' \
            "${{ secrets.KEYSTORE_PASSWORD }}" \
            "${{ secrets.KEY_PASSWORD }}" \
            "${{ secrets.KEY_ALIAS }}" \
            "flacify-release.jks" > android/key.properties
          echo "Keystore size: $(wc -c < android/app/flacify-release.jks) bytes"
          keytool -list -keystore android/app/flacify-release.jks \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" && echo "Keystore OK" || echo "Keystore FAILED"

      - name: Setup release signing
        if: github.event_name != 'pull_request'
        working-directory: android/app
        run: |
          cat >> build.gradle.kts << 'GRADLE'

          // Release signing - appended by CI
          android.signingConfigs.create("release") {
              storeFile = file("flacify-release.jks")
              storePassword = providers.gradleProperty("storePassword").orElse(System.getenv("STORE_PASSWORD") ?: "").get()
              keyAlias = "flacify"
              keyPassword = providers.gradleProperty("keyPassword").orElse(System.getenv("KEY_PASSWORD") ?: "").get()
          }
          android.buildTypes.getByName("release").signingConfig = android.signingConfigs.getByName("release")
          GRADLE

        env:
          STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Build APK
        run: |
          flutter build apk --release \
            --dart-define=NAVIDROME_URL=${{ secrets.NAVIDROME_URL }} \
            --dart-define=NAVIDROME_USER=${{ secrets.NAVIDROME_USER }} \
            --dart-define=NAVIDROME_PASS=${{ secrets.NAVIDROME_PASS }}

      - name: Build AAB
        if: github.event_name != 'pull_request'
        run: |
          flutter build appbundle --release \
            --dart-define=NAVIDROME_URL=${{ secrets.NAVIDROME_URL }} \
            --dart-define=NAVIDROME_USER=${{ secrets.NAVIDROME_USER }} \
            --dart-define=NAVIDROME_PASS=${{ secrets.NAVIDROME_PASS }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: flacify-apk
          path: build/app/outputs/apk/release/app-release.apk
          retention-days: 7

      - name: Upload AAB
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: flacify-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 7

      - name: Publish to Play Store
        if: startsWith(github.ref, 'refs/tags/')
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.imvj.flacify
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: completed

      - name: GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/apk/release/app-release.apk
          generate_release_notes: true
