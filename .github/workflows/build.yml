name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: 'stable'
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: ${{ runner.os }}-pub-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            /usr/local/lib/android/sdk/ndk
            /usr/local/lib/android/sdk/cmake
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Fix android config
        run: |
          sed -i '/android.aapt2FromMavenOverride/d' android/gradle.properties
          sed -i 's/compileSdk = 3[0-9]/compileSdk = 36/' android/app/build.gradle.kts
          sed -i 's/targetSdk = 3[0-9]/targetSdk = 36/' android/app/build.gradle.kts
          sed -i 's/version "8\.[0-9]\.[0-9]"/version "8.6.0"/' android/settings.gradle.kts
          echo 'android.enableJetifier=false' >> android/gradle.properties

      - name: Flutter pub get
        run: flutter pub get

      - name: Build APK
        run: |
          flutter build apk --release \
            --dart-define=NAVIDROME_URL=${{ secrets.NAVIDROME_URL }} \
            --dart-define=NAVIDROME_USER=${{ secrets.NAVIDROME_USER }} \
            --dart-define=NAVIDROME_PASS=${{ secrets.NAVIDROME_PASS }}

      - name: Rename APK
        run: |
          mv build/app/outputs/apk/release/app-release.apk \
             build/app/outputs/apk/release/flacify-${{ github.ref_name }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: flacify-apk
          path: build/app/outputs/apk/release/flacify-${{ github.ref_name }}.apk
          retention-days: 7

      - name: GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: Flacify ${{ github.ref_name }}
          body: |
            ## Flacify ${{ github.ref_name }}
            Self-hosted hi-fi music player for Navidrome.
            ### Install
            Download and install `flacify-${{ github.ref_name }}.apk` on your Android device.
          files: build/app/outputs/apk/release/flacify-${{ github.ref_name }}.apk
