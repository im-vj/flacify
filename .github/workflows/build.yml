name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 'any'
          channel: 'stable'
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Flutter analyze
        run: flutter analyze

      - name: Build APK
        run: flutter build apk --release

      - name: Rename APK
        run: |
          mv build/app/outputs/apk/release/app-release.apk \
             build/app/outputs/apk/release/flacify-${{ github.ref_name }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: flacify-apk
          path: build/app/outputs/apk/release/flacify-${{ github.ref_name }}.apk
          retention-days: 7

      - name: GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: Flacify ${{ github.ref_name }}
          body: |
            ## Flacify ${{ github.ref_name }}
            Self-hosted hi-fi music player for Navidrome.
            ### Install
            Download and install `flacify-${{ github.ref_name }}.apk` on your Android device.
          files: build/app/outputs/apk/release/flacify-${{ github.ref_name }}.apk
