name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: 'stable'
          cache: true  # cache Flutter SDK between runs

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: ${{ runner.os }}-pub-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Fix android config
        run: |
          # Remove aapt2 override (not valid on GitHub runners)
          sed -i '/android.aapt2FromMavenOverride/d' android/gradle.properties
          # Use compileSdk 35
          sed -i 's/compileSdk = 34/compileSdk = 35/' android/app/build.gradle.kts
          sed -i 's/targetSdk = 34/targetSdk = 35/' android/app/build.gradle.kts

      - name: Flutter pub get
        run: flutter pub get

      - name: Decode keystore
        if: github.event_name != 'pull_request'
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/flacify-release.jks
          cat > android/key.properties << KEYEOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=flacify-release.jks
          KEYEOF

      - name: Configure signing
        if: github.event_name != 'pull_request'
        run: |
          cat > android/app/build.gradle.kts << 'GRADLE'
          plugins {
              id("com.android.application")
              id("kotlin-android")
              id("dev.flutter.flutter-gradle-plugin")
          }
          android {
              namespace = "com.imvj.flacify"
              compileSdk = 35
              ndkVersion = flutter.ndkVersion
              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_11
                  targetCompatibility = JavaVersion.VERSION_11
              }
              kotlinOptions {
                  jvmTarget = JavaVersion.VERSION_11.toString()
              }
              signingConfigs {
                  create("release") {
                      val props = java.util.Properties()
                      file("../key.properties").inputStream().use { props.load(it) }
                      keyAlias = props["keyAlias"] as String
                      keyPassword = props["keyPassword"] as String
                      storeFile = file(props["storeFile"] as String)
                      storePassword = props["storePassword"] as String
                  }
              }
              defaultConfig {
                  applicationId = "com.imvj.flacify"
                  minSdk = 21
                  targetSdk = 35
                  versionCode = flutter.versionCode
                  versionName = flutter.versionName
              }
              buildTypes {
                  release {
                      signingConfig = signingConfigs.getByName("release")
                      isMinifyEnabled = true
                      isShrinkResources = true
                      proguardFiles(
                          getDefaultProguardFile("proguard-android-optimize.txt"),
                          "proguard-rules.pro"
                      )
                  }
              }
          }
          flutter {
              source = "../.."
          }
          GRADLE

      - name: Build APK
        run: |
          flutter build apk --release \
            --dart-define=NAVIDROME_URL=${{ secrets.NAVIDROME_URL }} \
            --dart-define=NAVIDROME_USER=${{ secrets.NAVIDROME_USER }} \
            --dart-define=NAVIDROME_PASS=${{ secrets.NAVIDROME_PASS }}

      - name: Build AAB
        if: github.event_name != 'pull_request'
        run: |
          flutter build appbundle --release \
            --dart-define=NAVIDROME_URL=${{ secrets.NAVIDROME_URL }} \
            --dart-define=NAVIDROME_USER=${{ secrets.NAVIDROME_USER }} \
            --dart-define=NAVIDROME_PASS=${{ secrets.NAVIDROME_PASS }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: flacify-apk
          path: build/app/outputs/apk/release/app-release.apk
          retention-days: 7

      - name: Upload AAB
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: flacify-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 7

      - name: Publish to Play Store (internal track)
        if: startsWith(github.ref, 'refs/tags/')
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.imvj.flacify
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: completed

      - name: GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/apk/release/app-release.apk
          generate_release_notes: true
