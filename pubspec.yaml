name: flacify
description: Self-hosted hi-fi music player
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Audio engine
  just_audio: ^0.9.40
  just_audio_background: ^0.0.1-beta.11
  audio_service: ^0.18.15

  # Networking
  dio: ^5.4.0
  crypto: ^3.0.3

  # State management
  flutter_riverpod: ^2.5.1

  # UI
  cached_network_image: ^3.3.1
  palette_generator: ^0.3.3+7
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1

  # Storage
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # Misc
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  assets:
    - assets/images/

